name: Daily Instagram Post

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install-fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: install-requirements
        run: pip install -r requirements.txt

      - name: generate-and-host-image
        run: python3 scripts/run_generate_and_host.py

      - name: commit-and-push-image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/images/
          git commit -m "chore: add today's post image" || echo "no changes"
          git push

      - name: wait-for-pages
        run: sleep 60

      - name: post-to-instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python3 scripts/run_post_instagram.py
