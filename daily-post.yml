name: Daily Instagram Post

on:
  schedule:
    # 毎日 09:00 JST に実行 (UTC 00:00 = JST 09:00)
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # 手動実行ボタンも使えるようにする

# docs/ フォルダに画像をコミットするための書き込み権限
permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 日本語フォントをインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: 画像生成 + docs/images/ へコピー
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'scripts')
          from generate_image import generate
          from host_via_github import host_image
          from datetime import datetime
          now = datetime.now()
          path = generate(now.month, now.day)
          url = host_image(str(path))
          print('IMAGE_URL=' + url)
          with open('image_url.txt', 'w') as f:
              f.write(url)
          "

      - name: 生成画像をコミット&プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/images/
          git commit -m "chore: 本日分の投稿画像を追加" || echo "変更なし"
          git push

      - name: GitHub Pagesの反映を待つ
        run: sleep 60

      - name: Instagramへ投稿
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'scripts')
          from generate_image import build_caption
          from post_instagram import post_photo
          from datetime import datetime
          now = datetime.now()
          caption = build_caption(now.month, now.day)
          with open('image_url.txt') as f:
              url = f.read().strip()
          media_id = post_photo(image_url=url, caption=caption)
          print('投稿完了 media_id=' + media_id)
          "
